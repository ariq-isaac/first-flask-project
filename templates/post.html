{% extends 'layout.html' %}
{% block content %}
<div class="container">
    <h1>Text Analyzer</h1>
    <form action="https://thirtydaysofpython-v1.herokuapp.com/post" method="POST">
        <div>
            <textarea rows="10" cols="40" name="content" autofocus></textarea>
        </div>
        <div>
            <input type="submit" class="btn" value="Process Text"/>
        </div>
    </form>
</div>
{% endblock %}
